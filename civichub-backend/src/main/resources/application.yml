server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: civichub-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:civichub}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jackson:
    time-zone: Asia/Ho_Chi_Minh
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
        format_sql: true
    show-sql: false

app:
  timezone: Asia/Ho_Chi_Minh
  database:
    auto-sync-audit-log-actions: ${AUTO_SYNC_AUDIT_LOG_ACTIONS:true}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  upload:
    path: ${UPLOAD_PATH:uploads}
  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_MINIMUM_32_CHARS_SECRET_FOR_LOCAL_DEV_ONLY}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.civichub: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
